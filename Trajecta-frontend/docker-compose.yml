services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
    container_name: trajecta_frontend
    restart: unless-stopped
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8080}
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - telemetry-network

networks:
  telemetry-network:
    external: true
    name: telemetry-network
