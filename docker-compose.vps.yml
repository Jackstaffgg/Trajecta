services:
  db:
    image: postgres:15-alpine
    container_name: trajecta_db
    restart: unless-stopped
    cpus: ${DB_CPU_LIMIT:-0.5}
    mem_limit: ${DB_MEM_LIMIT:-384m}
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d telemetry_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemetry-network

  redis:
    image: redis:7-alpine
    container_name: trajecta_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    cpus: ${REDIS_CPU_LIMIT:-0.25}
    mem_limit: ${REDIS_MEM_LIMIT:-160m}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemetry-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: trajecta_broker
    restart: unless-stopped
    cpus: ${RABBITMQ_CPU_LIMIT:-0.4}
    mem_limit: ${RABBITMQ_MEM_LIMIT:-320m}
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS}
    ports:
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - telemetry-network

  minio:
    image: minio/minio
    container_name: trajecta_minio
    restart: unless-stopped
    cpus: ${MINIO_CPU_LIMIT:-0.35}
    mem_limit: ${MINIO_MEM_LIMIT:-256m}
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telemetry-network

  minio-init:
    image: minio/mc
    container_name: trajecta_minio_init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set trajecta http://minio:9000 ${MINIO_USER} ${MINIO_PASS};
      mc mb trajecta/flight-data --ignore-existing;
      mc anonymous set public trajecta/flight-data;
      exit 0;
      "
    networks:
      - telemetry-network

  backend:
    build:
      context: ./Trajecta-api
      dockerfile: Dockerfile
    container_name: trajecta_backend
    restart: unless-stopped
    cpus: ${BACKEND_CPU_LIMIT:-1.0}
    mem_limit: ${BACKEND_MEM_LIMIT:-768m}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBIT_HOST: rabbitmq
      RABBIT_USER: ${RABBIT_USER}
      RABBIT_PASS: ${RABBIT_PASS}
      REDIS_HOST: redis
      MINIO_URL: http://minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASS: ${MINIO_PASS}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN}
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      TASK_CREATE_RATE_LIMIT_MAX_ATTEMPTS: ${TASK_CREATE_RATE_LIMIT_MAX_ATTEMPTS:-10}
      TASK_CREATE_RATE_LIMIT_WINDOW_SECONDS: ${TASK_CREATE_RATE_LIMIT_WINDOW_SECONDS:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_CHAT_URL: ${OPENAI_CHAT_URL:-https://api.openai.com/v1/chat/completions}
      OPENAI_CHAT_TIMEOUT_SECONDS: ${OPENAI_CHAT_TIMEOUT_SECONDS:-15}
      JAVA_TOOL_OPTIONS: ${BACKEND_JAVA_TOOL_OPTIONS:--Xms256m -Xmx512m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError}
      APP_SEED_ENABLED: ${APP_SEED_ENABLED:-true}
      OWNER_USERNAME: ${OWNER_USERNAME:-Owner}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-Owner123}
      OWNER_MAIL: ${OWNER_MAIL:-owner@ownermail.own}

    networks:
      - telemetry-network

  worker:
    build:
      context: ./Trajecta-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: ${WORKER_CPU_LIMIT:-0.7}
    mem_limit: ${WORKER_MEM_LIMIT:-576m}
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      RABBITMQ_URL: amqp://${RABBIT_USER}:${RABBIT_PASS}@rabbitmq:5672/%2F
      REQUEST_EXCHANGE: telemetry.exchange
      REQUEST_ROUTING_KEY: telemetry.parse
      REQUEST_QUEUE: telemetry.parse
      RESULTS_EXCHANGE: telemetry.exchange
      RESULTS_ROUTING_KEY: telemetry.results
      RESULTS_QUEUE: telemetry.results
      API_BASE_URL: http://backend:8080
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN}
      WORKER_TOKEN_HEADER: X-Worker-Token
      INTERNAL_RAW_PATH_TEMPLATE: /api/internal/v1/tasks/{taskId}/raw
      HTTP_TIMEOUT_SECONDS: ${HTTP_TIMEOUT_SECONDS:-30}
    networks:
      - telemetry-network

  frontend:
    build:
      context: ./Trajecta-frontend
      dockerfile: Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/trajecta/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/trajecta}
        VITE_WS_PATH: ${VITE_WS_PATH:-/ws}
    container_name: trajecta_frontend
    restart: unless-stopped
    cpus: ${FRONTEND_CPU_LIMIT:-0.3}
    mem_limit: ${FRONTEND_MEM_LIMIT:-128m}
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_UPSTREAM: backend:8080
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    networks:
      - telemetry-network

  edge:
    image: caddy:2-alpine
    container_name: trajecta_edge
    restart: unless-stopped
    cpus: ${EDGE_CPU_LIMIT:-0.2}
    mem_limit: ${EDGE_MEM_LIMIT:-128m}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - telemetry-network

networks:
  telemetry-network:
    name: telemetry-network
    driver: bridge

volumes:
  pgdata:
  redis_data:
  rabbitmq_data:
  minio_data:
  caddy_data:
  caddy_config:

