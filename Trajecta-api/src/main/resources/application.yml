spring:
  application:
    name: trajecta-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/telemetry_db
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}
    listener:
      simple:
        acknowledge-mode: auto
    template:
      retry:
        enabled: true
        initial-interval: 1s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2s

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2MB

server:
  tomcat:
    max-swallow-size: -1
  servlet:
    session:
      timeout: 30m

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:very_long_secret_key_for_trajecta_api_2026}
      expiration: 86400000
  internal:
    worker-token: ${INTERNAL_WORKER_TOKEN:super-secret-1488-worker-token}
  rate-limit:
    login:
      max-attempts: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:5}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:300}
      key-prefix: ${LOGIN_RATE_LIMIT_KEY_PREFIX:rate_limit:login:}
    task-create:
      max-attempts: ${TASK_CREATE_RATE_LIMIT_MAX_ATTEMPTS:10}
      window-seconds: ${TASK_CREATE_RATE_LIMIT_WINDOW_SECONDS:60}
      key-prefix: ${TASK_CREATE_RATE_LIMIT_KEY_PREFIX:rate_limit:task_create:}

minio:
  endpoint: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_USER:admin}
  secret-key: ${MINIO_PASS:password123}
  bucket: flight-data

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    display-request-duration: true
    doc-expansion: none

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springframework.amqp: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: trajecta-api
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.9,0.95,0.99
